name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
